# Production + local stack.
#
#   Local dev (just Postgres, run Next.js on host):
#     docker compose up -d postgres
#     npm run dev
#
#   Full stack (containerized app + db):
#     docker compose up -d --build
#
#   Production on VPS (behind Cloudflare tunnel / upstream nginx):
#     docker compose up -d --build
#     # App binds to 127.0.0.1:3002 — never exposed publicly.

services:
  postgres:
    image: postgres:16-alpine
    container_name: sovereignml-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sovereignml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-sovereignml}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Expose on loopback only — dev convenience, not reachable from outside VPS.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sovereignml} -d ${POSTGRES_DB:-sovereignml}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovereignml-app:latest
    container_name: sovereignml-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      # Override DATABASE_URL to use the internal service hostname.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-sovereignml}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sovereignml}?schema=public&connection_limit=10&pool_timeout=30"
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # Set to "true" on first deploy to auto-seed regions / plans / admin user.
      SEED_ON_BOOT: "${SEED_ON_BOOT:-false}"
    ports:
      # Loopback-only: Cloudflare tunnel / nginx on the host proxies to this.
      - "127.0.0.1:3002:3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
    name: sovereignml-pgdata

networks:
  internal:
    driver: bridge
